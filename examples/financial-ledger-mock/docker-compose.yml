# ============================================================
# Financial Ledger Mock — Docker Compose
# ============================================================
# Spring Boot microservice for deepferry HTTP API validation.
#
# Usage:  docker compose up --build
#         (requires deepferry root docker-compose MySQL running first)
# Access: http://localhost:8080
# MySQL:  deepferry-mysql:3306 (shared with deepferry)
#
# Standalone mode:  docker compose --profile standalone up --build
# ============================================================

services:
  mysql-finance:
    image: mysql:8
    container_name: finance-ledger-mysql
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: finance_ledger
      MYSQL_USER: finance
      MYSQL_PASSWORD: finance_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - finance-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    profiles: [standalone]

  financial-mock:
    build: .
    container_name: financial-ledger-mock
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://deepferry-mysql:3306/finance_ledger
      SPRING_DATASOURCE_USERNAME: finance
      SPRING_DATASOURCE_PASSWORD: finance_pass
    networks:
      - deepferry

networks:
  deepferry:
    external: true
    name: deepferry_deepferry

volumes:
  finance-mysql-data:
