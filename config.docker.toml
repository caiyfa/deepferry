# deepferry Docker 配置
# 复制此文件为 config.toml 并根据实际环境修改

[server]
host = "0.0.0.0"
port = 8000

# ── MySQL ──────────────────────────────────────────────────────────────
[[sources]]
id = "mysql-main"
type = "mysql"
name = "MySQL Database"
host = "${MYSQL_HOST:mysql}"
port = 3306
database = "${MYSQL_DATABASE:deepferry}"
user = "${MYSQL_USER:root}"
password = "${MYSQL_PASSWORD:testpass}"

# ── PostgreSQL ─────────────────────────────────────────────────────────
[[sources]]
id = "pg-main"
type = "postgresql"
name = "PostgreSQL Database"
host = "${POSTGRES_HOST:postgres}"
port = 5432
database = "${POSTGRES_DATABASE:deepferry}"
user = "${POSTGRES_USER:postgres}"
password = "${POSTGRES_PASSWORD:testpass}"

