# deepferry — Example Configuration
# Copy to config.toml and replace ${ENV_VAR} values or set environment variables.

# ── Server settings (optional) ──────────────────────────────────────────
[server]
host = "127.0.0.1"
port = 8000
log_level = "info"

# ── MySQL data source ───────────────────────────────────────────────────
[[sources]]
id = "mysql-main"
type = "mysql"
name = "Main MySQL Database"
host = "${MYSQL_HOST:localhost}"
port = 3306
database = "${MYSQL_DATABASE:testdb}"
user = "${MYSQL_USER:root}"
password = "${MYSQL_PASSWORD}"

# ── LLM Integration (optional, required for /api/explore) ────────────────
# [llm]
# provider = "deepseek"                          # "openai" | "deepseek" | "local"
# api_key = "${DEEPFERRY_LLM_API_KEY}"           # env-var injection, never plaintext
# model = "deepseek-chat"
# base_url = "https://api.deepseek.com/v1"       # compatible API endpoint
# max_tokens = 2000
# temperature = 0.1                              # low for deterministic SQL
# timeout = 15                                   # seconds

# ── Storage settings (optional, defaults to ~/.deepferry) ────────────────
# [storage]
# data_dir = "~/.deepferry"                      # base dir for datasets, caches

# ── PostgreSQL data source ──────────────────────────────────────────────
[[sources]]
id = "pg-analytics"
type = "postgresql"
name = "Analytics PostgreSQL"
host = "${POSTGRES_HOST:localhost}"
port = 5432
database = "${POSTGRES_DATABASE:testdb}"
user = "${POSTGRES_USER:postgres}"
password = "${POSTGRES_PASSWORD}"
