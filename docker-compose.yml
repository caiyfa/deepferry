name: deepferry

services:
  deepferry:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/caiyfa/deepferry:latest
    ports:
      - "8000:8000"
    volumes:
      - ./config.toml:/home/deepferry/config.toml:ro
      - deepferry_data:/home/deepferry/data
    environment:
      - MYSQL_HOST
      - MYSQL_PORT
      - MYSQL_USER
      - MYSQL_PASSWORD
      - MYSQL_DATABASE
      - POSTGRES_HOST
      - POSTGRES_PORT
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DATABASE
      - DEEPFERRY_DB_PATH
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      org.opencontainers.image.source: "https://github.com/caiyfa/deepferry"
      org.opencontainers.image.description: "MCP-based universal data access layer for LLM agents"
    networks:
      - deepferry

  # ── Optional: MySQL for development ──────────────────────────────────
  mysql:
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-testpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-deepferry}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles: [full]
    networks:
      - deepferry

  # ── Optional: PostgreSQL for development ─────────────────────────────
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testpass}
      POSTGRES_DB: ${POSTGRES_DATABASE:-deepferry}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles: [full]
    networks:
      - deepferry

networks:
  deepferry:
    driver: bridge

volumes:
  deepferry_data:
  mysql_data:
  postgres_data:
