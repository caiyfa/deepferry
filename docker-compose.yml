name: deepferry

services:
  deepferry:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/caiyfa/deepferry:latest
    ports:
      - "8000:8000"
    volumes:
      - ./config.docker.toml:/home/deepferry/config.toml:ro
      - deepferry_data:/home/deepferry/data
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: testpass
      MYSQL_DATABASE: deepferry
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testpass
      POSTGRES_DATABASE: deepferry
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      org.opencontainers.image.source: "https://github.com/caiyfa/deepferry"
      org.opencontainers.image.description: "MCP-based universal data access layer for LLM agents"
    networks:
      - deepferry

  # ── MySQL (shared by deepferry + financial-ledger-mock) ─────────────
  mysql:
    image: mysql:8
    container_name: deepferry-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-testpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-deepferry}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - deepferry

  # ── Optional: PostgreSQL for development ─────────────────────────────
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testpass}
      POSTGRES_DB: ${POSTGRES_DATABASE:-deepferry}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles: [full]
    networks:
      - deepferry

networks:
  deepferry:
    driver: bridge

volumes:
  deepferry_data:
  mysql_data:
  postgres_data:
